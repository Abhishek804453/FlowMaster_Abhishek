services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: flowmaster-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: flowmaster-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: flowmaster-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres
    container_name: flowmaster-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowmaster
    ports:
      - "5433:5432"

  redis:
    image: redis
    container_name: flowmaster-redis
    ports:
      - "6379:6379"
